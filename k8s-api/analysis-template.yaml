apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate

metadata:
  name: api-success-rate
  namespace: demo

spec:
  metrics:
  - name: success-rate
    interval: 30s
    count: 3
    successCondition: result[0] >= 0.95
    failureLimit: 1

    provider:
      prometheus:
        address: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
        query: |
          sum(rate(flask_http_request_total{status=~"2.."}[2m]))
          /
          sum(rate(flask_http_request_total[2m]))
