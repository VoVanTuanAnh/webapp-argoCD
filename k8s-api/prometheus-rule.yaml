apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: api-slo
  namespace: demo

spec:
  groups:
  - name: api.rules

    rules:

    - alert: ApiSuccessRateLow

      expr: |
        (
          100 *
          sum(rate(flask_http_request_total{status=~"2.."}[5m]))
          /
          sum(rate(flask_http_request_total[5m]))
        ) < 95

      for: 2m

      labels:
        severity: warning

      annotations:
        summary: API success rate below SLO
        description: Success rate has dropped below 95%