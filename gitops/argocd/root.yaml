apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/VoVanTuanAnh/demo-webapp-argoCD.git
    targetRevision: main

    path: gitops/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true